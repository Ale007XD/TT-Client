name: Generate Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wrapper:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Fix permissions
        run: chmod +x android/gradlew

      - name: Commit and Push Wrapper
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f android/gradlew
          git add -f android/gradlew.bat
          git add -f android/gradle/wrapper/gradle-wrapper.jar
          git add -f android/gradle/wrapper/gradle-wrapper.properties

          git commit -m "Add Gradle Wrapper 8.7" || echo "Nothing to commit"
          git push
